---
options:
  nodeWidth: 280
  nodeHeight: 160
  childrenMargin: 60
  compactMarginBetween: 40
  compactMarginPair: 35
  neighbourMargin: 25
schema:
  id: number | required
  name: string | required
  title: string | required
  department: string | required
  budget_allocated: number | required
  budget_spent: number | required
  budget_remaining: number | optional
  variance_pct: number | optional
card:
  - div:
      style: font-size:14px;font-weight:700;color:#1a202c;margin-bottom:4px;
      content: $name$
  - div:
      style: font-size:10px;color:#667eea;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;
      content: $title$
  - div:
      style: font-size:11px;color:#2d3748;margin-bottom:4px;
      children:
        - span:
            style: font-weight:600;
            content: "💰 Allocated: "
        - span:
            style: color:#38a169;font-weight:600;
            content: $budget_allocated$
  - div:
      style: font-size:11px;color:#2d3748;margin-bottom:4px;
      children:
        - span:
            style: font-weight:600;
            content: "📊 Spent: "
        - span:
            style: color:#dd6b20;font-weight:600;
            content: $budget_spent$
  - div:
      style: font-size:11px;color:#2d3748;margin-bottom:4px;
      children:
        - span:
            style: font-weight:600;
            content: "💵 Remaining: "
        - span:
            style: color:#3182ce;font-weight:600;
            content: $budget_remaining$
  - div:
      style: font-size:10px;margin-top:6px;padding-top:6px;border-top:1px solid #e2e8f0;
      children:
        - span:
            style: font-weight:600;color:#718096;
            content: "Variance: "
        - span:
            style: font-weight:700;
            content: $variance_pct$
---

