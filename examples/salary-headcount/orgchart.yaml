---
options:
  nodeWidth: 270
  nodeHeight: 165
  childrenMargin: 60
  compactMarginBetween: 40
  compactMarginPair: 35
  neighbourMargin: 25
schema:
  id: number | required
  name: string | required
  title: string | required
  department: string | required
  direct_reports: number | required
  total_headcount: number | required
  direct_salary: number | required
  total_salary_budget: string | required
  avg_salary: string | optional
  open_positions: number | optional
card:
  - div:
      style: font-size:13px;font-weight:700;color:#1a202c;margin-bottom:3px;
      content: $name$
  - div:
      style: font-size:10px;color:#667eea;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;
      content: $title$
  - div:
      style: display:flex;gap:12px;margin-bottom:6px;
      children:
        - div:
            style: font-size:10px;color:#2d3748;
            children:
              - span:
                  style: font-weight:600;
                  content: "👤 Direct: "
              - span:
                  style: color:#3182ce;font-weight:700;
                  content: $direct_reports$
        - div:
            style: font-size:10px;color:#2d3748;
            children:
              - span:
                  style: font-weight:600;
                  content: "👥 Total: "
              - span:
                  style: color:#805ad5;font-weight:700;
                  content: $total_headcount$
  - div:
      style: font-size:10px;color:#2d3748;margin-bottom:4px;
      children:
        - span:
            style: font-weight:600;
            content: "💵 My Salary: "
        - span:
            style: color:#38a169;font-weight:600;
            content: $direct_salary$
  - div:
      style: font-size:10px;color:#2d3748;margin-bottom:4px;
      children:
        - span:
            style: font-weight:600;
            content: "💰 Team Budget: "
        - span:
            style: color:#dd6b20;font-weight:700;
            content: $total_salary_budget$
  - div:
      style: font-size:9px;margin-top:6px;padding-top:6px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;
      children:
        - div:
            style: color:#718096;
            children:
              - span:
                  style: font-weight:600;
                  content: "Avg: "
              - span:
                  content: $avg_salary$
        - div:
            style: color:#e53e3e;font-weight:600;
            children:
              - span:
                  content: "🔴 Open: "
              - span:
                  content: $open_positions$
---

