---
options:
  nodeWidth: 300
  nodeHeight: 180
  childrenMargin: 60
  compactMarginBetween: 45
  compactMarginPair: 40
  neighbourMargin: 30
schema:
  id: number | required
  name: string | required
  title: string | required
  department: string | required
  objective: string | required
  kr1: string | required
  kr1_progress: number | required
  kr2: string | required
  kr2_progress: number | required
  overall_progress: number | required
card:
  - div:
      style: font-size:13px;font-weight:700;color:#1a202c;margin-bottom:2px;
      content: $name$
  - div:
      style: font-size:9px;color:#667eea;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;
      content: $title$
  - div:
      style: font-size:10px;color:#2d3748;font-weight:600;margin-bottom:6px;padding:4px 6px;background:#f7fafc;border-radius:4px;border-left:3px solid #667eea;
      children:
        - span:
            style: color:#553c9a;
            content: "🎯 "
        - span:
            content: $objective$
  - div:
      style: font-size:9px;color:#4a5568;margin-bottom:3px;
      children:
        - span:
            style: font-weight:600;
            content: "KR1: "
        - span:
            content: $kr1$
        - span:
            style: font-weight:700;color:#38a169;margin-left:4px;
            content: $kr1_progress$
  - div:
      style: font-size:9px;color:#4a5568;margin-bottom:3px;
      children:
        - span:
            style: font-weight:600;
            content: "KR2: "
        - span:
            content: $kr2$
        - span:
            style: font-weight:700;color:#38a169;margin-left:4px;
            content: $kr2_progress$
  - div:
      style: font-size:11px;margin-top:6px;padding-top:6px;border-top:1px solid #e2e8f0;text-align:center;
      children:
        - span:
            style: font-weight:700;color:#2d3748;
            content: "Overall: "
        - span:
            style: font-weight:800;color:#667eea;font-size:13px;
            content: $overall_progress$
---

