    <!-- Load YChart Editor CSS and JS from dist -->
    <link rel="stylesheet" href="./dist/ychart-editor.css">
    <script src="./dist/ychart-editor.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: var(--yc-gradient-primary);
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--yc-gradient-header-dark);
            backdrop-filter: var(--yc-backdrop-blur);
            padding: 1.5rem 2rem;
            box-shadow: var(--yc-shadow-header);
            z-index: 10;
            flex-shrink: 0;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--yc-gradient-rainbow);
            background-size: 200% 100%;
            animation: rainbow 3s linear infinite;
        }

        @keyframes rainbow {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 200% 0%;
            }
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: var(--yc-gradient-title-light);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--yc-color-header-subtext);
            font-size: 1rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left {
            flex: 1;
        }

        .git-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            padding-top: 0.5rem;
        }

        .git-info a {
            color: var(--yc-color-overlay-white-90);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.2s;
        }

        .git-info a:hover {
            color: var(--yc-color-text-inverse);
            text-decoration: underline;
        }

        .git-info svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .commit-hash {
            font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Monaco, monospace;
            background: var(--yc-color-overlay-white-15);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .examples-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .examples-selector label {
            font-size: 0.85rem;
            color: var(--yc-color-overlay-white-90);
        }

        .examples-selector select {
            padding: 0.35rem 0.6rem;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .examples-selector select:hover {
            background: rgba(255,255,255,0.25);
        }

        .examples-selector select:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
        }

        .examples-selector select option {
            background: #4a5568;
            color: white;
        }

        .ychart-wrapper {
            flex: 1;
            background: var(--yc-color-bg-card);
            margin: 1rem;
            border-radius: 12px;
            box-shadow: var(--yc-shadow-wrapper);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        #ychart-container {
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        
        /* Ensure CodeMirror editor can scroll properly */
        #ychart-editor {
            height: 100% !important;
            overflow: hidden !important;
        }
        
        #ychart-editor .cm-editor {
            height: 100% !important;
        }
        
        #ychart-editor .cm-scroller {
            overflow-y: auto !important;
            max-height: 100% !important;
        }

        .footer {
            text-align: center;
            padding: 1rem;
            color: var(--yc-color-text-inverse);
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .footer a {
            color: var(--yc-color-text-inverse);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

        // Fetch and display git commit info from GitHub API
        (async function() {
            const repoUrl = 'https://github.com/mieweb/ychart';
            const apiUrl = 'https://api.github.com/repos/mieweb/ychart/commits?per_page=1';
            
            const commitHashEl = document.getElementById('commit-hash');
            const commitLinkEl = document.getElementById('commit-link');
            
            try {
                const response = await fetch(apiUrl);
                if (response.ok) {
                    const commits = await response.json();
                    if (commits && commits.length > 0) {
                        const commit = commits[0];
                        const shortHash = commit.sha.substring(0, 7);
                        
                        if (commitHashEl) {
                            commitHashEl.textContent = shortHash;
                        }
                        if (commitLinkEl) {
                            commitLinkEl.href = `${repoUrl}/commit/${commit.sha}`;
                            commitLinkEl.title = `View commit ${shortHash} on GitHub`;
                        }
                    }
                } else {
                    // Fallback if API fails
                    if (commitHashEl) {
                        commitHashEl.textContent = 'latest';
                    }
                }
            } catch (error) {
                // Fallback if fetch fails
                if (commitHashEl) {

        function initializeYChartEditor(data) {
            console.log('🚀 Initializing YChart Editor...');
            
            // Clear existing editor if any
            const container = document.getElementById('ychart-container');
            if (container) {
                container.innerHTML = '';
            }
            
            // Initialize YChart Editor with beautiful configuration
            const editor = new window.YChartEditor({
                nodeWidth: 250,
                nodeHeight: 120,
                editorTheme: 'dark',
                collapsible: true,
                toolbarPosition: 'bottomleft',
                toolbarOrientation: 'horizontal'
            });

            // Setup the editor
            editor
                .initView('ychart-container', data || yamlData)
                .bgPatternStyle('dotted')
                .actionBtnPos('bottomleft', 'horizontal');

            console.log('✅ YChart Editor initialized successfully!');
            console.log('💡 Tips:');
            console.log('   - Click nodes to view details');
            console.log('   - Use toolbar buttons to expand/collapse, export, etc.');
            console.log('   - Edit YAML in the right panel to update the chart');
            console.log('   - Drag nodes to pan, scroll to zoom');
            
            // Make it accessible globally
            window.ychartEditor = editor;
            currentEditor = editor;
            
            // Auto-fit after a short delay
            setTimeout(() => {
                if (editor && editor.orgChart) {
                    console.log('📐 Auto-fitting chart to viewport...');
                }
            }, 500);
        }

        // Load example from hardcoded data
        function loadExample(exampleKey) {
            const data = exampleData[exampleKey];
            
            if (!data) {
                // Use default inline data
                initializeYChartEditor(yamlData);
                return;
            }
            
            initializeYChartEditor(data);
        }

        // Setup example selector
        function setupExampleSelector() {
            const select = document.getElementById('example-select');
            if (select) {
                select.addEventListener('change', (e) => {
                    loadExample(e.target.value);
                });
            }
        }
        
        // Initialize when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                initializeYChartEditor(yamlData);
                setupExampleSelector();
            });
        } else {
            initializeYChartEditor(yamlData);
            setupExampleSelector();
        }
    </script>
